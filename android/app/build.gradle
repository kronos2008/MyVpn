plugins {
    id "com.android.application"
    id "kotlin-android"
    // Этот плагин заменяет старую строку "apply from: flutter.gradle"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.myvpnapp"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

// Блок для Flutter указываем после android
flutter {
    source '../..'
}

// Убедись, что зависимости на Kotlin больше нет, или удали её
dependencies {
    // implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version" // Эту строку нужно удалить!
}

workflows:
  default-workflow:
    name: My VPN App
    max_build_duration: 30
    environment:
      flutter: 3.41.4  # Меняем на версию, которую советует ошибка
    scripts:
      - flutter clean
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

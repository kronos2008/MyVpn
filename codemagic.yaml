workflows:
  default-workflow:
    name: My VPN App
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_ID: "com.example.myvpnapp"
    scripts:
      - name: Get dependencies
        script: flutter packages get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - твоя_почта@gmail.com  # замени на свою
